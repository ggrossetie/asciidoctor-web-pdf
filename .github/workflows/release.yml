name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0-alpha.17)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac-arm64
            artifact: mac-arm64-binary
          - os: ubuntu-latest
            platform: linux-x64
            artifact: linux-x64-binary
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: linux-arm64-binary
          - os: windows-latest
            platform: win-x64
            artifact: win-x64-binary
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Set version
        run: npm version ${{ inputs.version }} --no-git-tag-version
      - name: Build binary
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/asciidoctor-web-pdf-${{ matrix.platform }}.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev ghostscript poppler-utils
      - name: Install dependencies
        run: npm ci
      - name: Lint and test
        run: |
          npm run lint
          npm t
      - name: Commit and tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.version }} -m "Release v%s"
          git push origin HEAD --tags
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: build/
      - name: Create GitHub release
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ inputs.version }}" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            $PRERELEASE_FLAG \
            build/asciidoctor-web-pdf-win-x64.zip \
            build/asciidoctor-web-pdf-mac-arm64.zip \
            build/asciidoctor-web-pdf-linux-x64.zip \
            build/asciidoctor-web-pdf-linux-arm64.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_dockerhub:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Setup Docker
        # taken from https://github.com/docker/github-actions/blob/0f18e2abad9a4ac2963d2516246787375b5ec917/Dockerfile#L32
        run: curl -fL https://download.docker.com/linux/static/stable/x86_64/docker-20.10.4.tgz | tar xzO docker/docker > docker && sudo mv -f docker /usr/bin/docker && sudo chmod +x /usr/bin/docker
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      - name: Publish Docker images
        run: RELEASE_VERSION=${{ inputs.version }} make publishDocker
